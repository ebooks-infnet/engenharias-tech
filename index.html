                breadcrumb.innerText = index === -1 ? "" : `ARTIGO ${index + 1} DE ${ebookData.length}`;
            }

            // Atualiza Barra de Progresso Superior
            const progressBar = document.getElementById('progress-bar');
            if (progressBar) {
                const percent = ((index + 2) / (ebookData.length + 1)) * 100;
                progressBar.style.width = `${percent}%`;
            }

            // Renderiza Conteúdo Principal e atualiza os dropdowns se estiverem abertos
            renderContent();
            if (state.activePanel === 'bookmarks') {
                renderBookmarksPanel();
            }

            // Rola o container interno de volta ao topo instantaneamente
            const container = document.getElementById('scroll-container');
            if (container) {
                container.scrollTop = 0;
            }
        }

        function setTheme(themeName) {
            state.theme = themeName;
            
            // Mapeamento de Cores do Tema no Body, Barra Superior e Dropdowns
            const root = document.getElementById('app-root');
            const topNavigation = document.getElementById('top-navigation');
            const searchPanel = document.getElementById('search-panel');
            const bookmarksPanel = document.getElementById('bookmarks-panel');
            
            const themeClasses = {
                light: { 
                    body: 'bg-white text-slate-800', 
                    topNavigation: 'bg-slate-50 border-slate-200 text-slate-800',
                    panel: 'bg-white border-slate-200 text-slate-800'
                },
                dark: { 
                    body: 'bg-[#0f172a] text-slate-100', // Unificado com a mesma cor padrão de barra lateral (Slate 900)
                    topNavigation: 'bg-[#0f172a] border-slate-800 text-slate-100',
                    panel: 'bg-[#0f172a] border-slate-800 text-slate-100'
                }
            };

            // Aplica os estilos nos elementos pai
            root.className = `h-screen max-h-screen overflow-hidden flex flex-col transition-colors duration-200 ${themeClasses[themeName].body}`;
            topNavigation.className = `w-full border-b px-4 py-3 flex flex-col md:flex-row items-center justify-between gap-3 flex-shrink-0 z-50 ${themeClasses[themeName].topNavigation}`;
            searchPanel.className = `hidden absolute top-32 md:top-[68px] right-4 w-80 border rounded-xl shadow-2xl z-50 p-4 max-h-[70vh] flex flex-col space-y-4 ${themeClasses[themeName].panel}`;
            bookmarksPanel.className = `hidden absolute top-32 md:top-[68px] right-4 w-80 border rounded-xl shadow-2xl z-50 p-4 max-h-[70vh] flex flex-col space-y-3 ${themeClasses[themeName].panel}`;

            // Seleção visual dos botões de temas superiores
            ['light', 'dark'].forEach(t => {
                const btn = document.getElementById(`theme-btn-${t}`);
                if (btn) {
                    if (t === themeName) {
                        btn.className = "px-2 py-1 rounded text-[10px] font-bold uppercase transition-all bg-[#23599c] text-white";
                    } else {
                        btn.className = "px-2 py-1 rounded text-[10px] font-bold uppercase transition-all opacity-60";
                    }
                }
            });

            // Atualiza conteúdos
            renderContent();
            updateTabButtonStyles();
            updateHeaderBookmarkIcon();
        }

        function toggleFontSize() {
            const sizes = ['small', 'normal', 'large', 'xl'];
            const nextIdx = (sizes.indexOf(state.fontSize) + 1) % sizes.length;
            state.fontSize = sizes[nextIdx];
            renderContent();
        }

        function toggleCurrentBookmark() {
            if (state.currentChapterIndex === -1) return;
            const activeId = ebookData[state.currentChapterIndex].id;
            const idx = state.bookmarks.indexOf(activeId);
            if (idx !== -1) {
                state.bookmarks.splice(idx, 1);
            } else {
                state.bookmarks.push(activeId);
            }
            saveBookmarks();
            updateHeaderBookmarkIcon();
            if (state.activePanel === 'bookmarks') {
                renderBookmarksPanel();
            }
        }

        function updateHeaderBookmarkIcon() {
            const icon = document.getElementById('bookmark-header-icon');
            const btn = document.getElementById('bookmark-header-btn');
            if (!icon || !btn || state.currentChapterIndex === -1) return;
            const activeId = ebookData[state.currentChapterIndex].id;
            const isBookmarked = state.bookmarks.includes(activeId);
            if (isBookmarked) {
                icon.setAttribute('fill', 'currentColor');
                icon.className = "w-5 h-5 text-blue-600 dark:text-blue-400 opacity-100 transition-all duration-200";
                btn.className = "p-2 rounded-lg bg-blue-50 dark:bg-blue-950/40 hover:bg-blue-100 dark:hover:bg-blue-900/40 transition-all duration-200";
            } else {
                icon.setAttribute('fill', 'none');
                icon.className = "w-5 h-5 opacity-50 text-slate-800 dark:text-slate-200 transition-all duration-200";
                btn.className = "p-2 rounded-lg hover:bg-black/10 dark:hover:bg-white/10 transition-all duration-200";
            }
        }

        // --- SISTEMA DE FORMATAÇÃO E PARSE DE TEXTO ---
        function highlightText(text, search) {
            if (!text || !search || !search.trim()) return text;
            const escapedSearch = search.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escapedSearch})`, 'gi');
            return text.replace(regex, `<mark class="bg-yellow-200 text-black px-0.5 rounded font-semibold">$1</mark>`);
        }

        function renderFormattedText(text, search, isTitle = false) {
            if (!text) return '';
            const boldParts = text.split('**');
            let resultHTML = '';
            
            boldParts.forEach((part, index) => {
                const isBold = index % 2 === 1;
                const content = highlightText(part, search);
                if (isBold) {
                    const boldClass = isTitle ? "font-extrabold text-[#689ccb]" : "font-extrabold text-inherit";
                    resultHTML += `<strong class="${boldClass}">${content}</strong>`;
                } else {
                    resultHTML += `<span>${content}</span>`;
                }
            });
            return resultHTML;
        }

        // Removidas as classes rígidas de texto para que todos os parágrafos respondam perfeitamente ao seletor de tamanho de fonte global
        function renderParagraphHTML(paragraph) {
            // Títulos dinâmicos (##)
            if (paragraph.startsWith('## ')) {
                return `<h3 class="text-xl md:text-2xl font-bold mt-8 mb-4 border-b pb-2 text-[#23599c] dark:text-[#508ad3] border-current opacity-90">
                    ${renderFormattedText(paragraph.replace('## ', ''), state.searchQuery, true)}
                </h3>`;
            }
            // Subtítulos (###)
            if (paragraph.startsWith('### ')) {
                return `<h4 class="text-lg md:text-xl font-bold mt-6 mb-3 text-[#23599c] dark:text-[#508ad3]">
                    ${renderFormattedText(paragraph.replace('### ', ''), state.searchQuery, true)}
                </h4>`;
            }
            // Listas normatizadas (- ou •)
            if (paragraph.startsWith('- ') || paragraph.startsWith('• ') || paragraph.startsWith('•\n')) {
                return `<li class="ml-5 list-disc mb-2 pl-2 leading-relaxed">
                    ${renderFormattedText(paragraph.replace(/^[-•]\s*/, ''), state.searchQuery, false)}
                </li>`;
            }

            // Tratamento de quebras de linhas internas
            if (paragraph.includes('\n')) {
                const lines = paragraph.split('\n');
                let compositeHTML = '<div class="my-4 space-y-2">';
                lines.forEach(line => {
                    if (line.startsWith('- ') || line.startsWith('• ')) {
                        compositeHTML += `<li class="ml-5 list-disc pl-2 leading-relaxed">${renderFormattedText(line.replace(/^[-•]\s*/, ''), state.searchQuery, false)}</li>`;
                    } else if (line.includes(':') && line.length < 120) {
                        const parts = line.split(':');
                        const boldPart = parts[0];
                        const normalPart = parts.slice(1).join(':');
                        compositeHTML += `<p class="mb-1 leading-relaxed"><strong class="text-[#23599c] dark:text-[#508ad3]">${renderFormattedText(boldPart, state.searchQuery, false)}:</strong>${renderFormattedText(normalPart, state.searchQuery, false)}</p>`;
                    } else {
                        compositeHTML += `<p class="leading-relaxed">${renderFormattedText(line, state.searchQuery, false)}</p>`;
                    }
                });
                compositeHTML += '</div>';
                return compositeHTML;
            }

            return `<p class="mb-4 text-justify leading-relaxed">${renderFormattedText(paragraph, state.searchQuery, false)}</p>`;
        }

        // --- RENDERIZAÇÃO DO CONTEÚDO PRINCIPAL (Artigo Ativo ou Capa) ---
        function renderContent() {
            const container = document.getElementById('scroll-container');
            if (!container) return;

            // Renderiza Capa Escrita caso o índice seja -1
            if (state.currentChapterIndex === -1) {
                // Layout elegante com fundo fixo #689ccb e textos contrastantes em #013056
                let coverHTML = `
                <div class="relative flex flex-col items-center justify-between text-center min-h-[75vh] py-12 px-6 rounded-3xl border border-dashed border-white/20 bg-[#013056] text-white overflow-hidden shadow-2xl">
                    
                    <!-- Corpo Principal de Títulos -->
                    <div class="flex flex-col items-center my-auto space-y-6 max-w-2xl pt-10">
                        <div class="mb-2">
                            <img src="https://posgraduacao.infnet.edu.br/ead/wp-content/uploads/sites/13/2024/11/Design-sem-nome-17-1-300x91.png" alt="Logo Infnet Grande" class="h-20 object-contain" />
                        </div>

                        <!-- Título com "E-book" sozinho numa linha e "Engenharias Tech" juntas na linha seguinte -->
                        <h1 class="text-4xl sm:text-5xl md:text-6xl font-black tracking-tight leading-tight text-white drop-shadow-sm">
                            <span class="block">E-book</span>
                            <span class="block">Engenharias Tech</span>
                        </h1>
                        
                        <p class="text-base sm:text-lg md:text-xl text-white font-medium leading-relaxed max-w-xl">
                            Construindo o Futuro da Tecnologia: O guia definitivo para entender, projetar e liderar as Engenharias Tech.
                        </p>

                        <div class="pt-6">
                            <button onclick="setChapter(0)" class="px-8 py-4 bg-[#23599c] hover:bg-[#1a4478] active:scale-95 text-white font-black text-sm rounded-2xl shadow-lg hover:shadow-[#23599c]/20 transition-all flex items-center space-x-3 mx-auto">
                                <span>ABRIR E-BOOK INTERATIVO</span>
                                <svg class="w-5 h-5 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Sumário de Atalhos Rápidos Pleno e Aberto na Capa (Um por Linha, Sem Corte de Título) -->
                    <div class="w-full mt-12 pt-8 border-t border-[#013056]/20">
                        <h3 class="text-sm font-black uppercase tracking-widest text-center text-white drop-shadow-sm mb-6">
                            Índice Geral de Conteúdo
                        </h3>
                        
                        <!-- Lista plana e aberta, com um capítulo por linha -->
                        <div class="w-full max-w-3xl mx-auto space-y-3 text-left">
                `;

                ebookData.forEach((chap, idx) => {
                    coverHTML += `
                        <button onclick="setChapter(${idx})" class="w-full p-4 border border-white/20 rounded-xl bg-white/5 hover:bg-white/15 text-left transition-all text-white font-semibold whitespace-normal break-words leading-relaxed text-sm block shadow-sm">
                            ${chap.title}
                        </button>
                    `;
                });

                coverHTML += `
                        </div>
                    </div>
                </div>
                `;

                container.innerHTML = coverHTML;
                return;
            }

            // Renderiza Artigo de Leitura Ativo
            const article = ebookData[state.currentChapterIndex];
            const fontClasses = {
                small: 'text-xs md:text-sm leading-relaxed',
                normal: 'text-sm md:text-base leading-relaxed',
                large: 'text-lg md:text-xl leading-relaxed',
                xl: 'text-xl md:text-2xl leading-relaxed'
            };

            const articleBgClasses = {
                light: 'bg-slate-50 border-slate-100 text-slate-700',
                dark: 'bg-slate-800 border-slate-700 text-slate-300'
            };

            let paragraphsHTML = '';
            article.content.forEach(paragraph => {
                paragraphsHTML += renderParagraphHTML(paragraph);
            });

            // Corrigidas as variáveis de interpolação JavaScript (${}) que estavam usando sintaxe inadequada do React no template string
            const articleHTML = `
            <article class="space-y-6 ${fontClasses[state.fontSize]}">
                <header class="space-y-2 pb-6 border-b border-current opacity-80">
                    <div class="text-xs font-bold text-[#23599c] dark:text-[#508ad3] tracking-wider uppercase flex items-center space-x-2">
                        <span>Instituto Infnet • ${article.pageRange}</span>
                    </div>
                    <h2 class="text-2xl sm:text-3xl font-black leading-tight">
                        ${renderFormattedText(article.title, state.searchQuery, true)}
                    </h2>
                </header>

                <div class="space-y-4">
                    ${paragraphsHTML}
                </div>

                <div class="p-4 rounded-xl border-l-4 ${articleBgClasses[state.theme]} mt-8">
                    <p class="text-xs font-serif italic">
                        Este conteúdo faz parte do ecossistema das Engenharias Tech do Instituto Infnet, preparando profissionais estratégicos e estruturais para a TI do futuro.
                    </p>
                </div>

                <!-- Barra de Navegação de Rodapé de Leitura -->
                <div class="p-4 flex flex-col sm:flex-row items-center justify-between gap-4 border-t border-current opacity-50 text-xs font-bold">
                    <button onclick="setChapter(${state.currentChapterIndex - 1})" class="w-full sm:w-auto px-4 py-2 border rounded-lg hover:bg-black/5 dark:hover:bg-white/5 text-center transition-all flex items-center justify-center space-x-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" />
                        </svg>
                        <span>Anterior</span>
                    </button>

                    <button onclick="setChapter(-1)" class="w-full sm:w-auto px-4 py-2 border rounded-lg hover:bg-black/5 dark:hover:bg-white/5 text-center transition-all">
                        Ir para a Capa
                    </button>

                    ${state.currentChapterIndex < ebookData.length - 1 ? `
                        <button onclick="setChapter(${state.currentChapterIndex + 1})" class="w-full sm:w-auto px-4 py-2 border rounded-lg hover:bg-black/5 dark:hover:bg-white/5 text-center transition-all flex items-center justify-center space-x-2">
                            <span>Próximo</span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" />
                            </svg>
                        </button>
                    ` : `
                        <button onclick="setChapter(-1)" class="w-full sm:w-auto px-4 py-2 bg-[#23599c] text-white rounded-lg text-center transition-all">
                            Voltar ao Início
                        </button>
                    `}
                </div>
            </article>
            `;

            container.innerHTML = articleHTML;
        }

        // --- RENDERIZAÇÃO DOS PAINÉIS FLUTUANTES SUPERIORES ---
        function renderBookmarksPanel() {
            const container = document.getElementById('bookmarks-panel-content');
            if (!container) return;

            let tabHTML = '';
            if (state.bookmarks.length === 0) {
                tabHTML += `
                <p class="text-xs text-center opacity-60 py-8">
                    Nenhum capítulo favoritado ainda. Toque na fita de favoritos enquanto lê para salvar aqui!
                </p>
                `;
            } else {
                state.bookmarks.forEach(bId => {
                    const chapterIndex = ebookData.findIndex(c => c.id === bId);
                    const chapter = ebookData[chapterIndex];
                    if (chapter) {
                        tabHTML += `
                        <button onclick="setChapter(${chapterIndex}); toggleTabPanel('bookmarks');" class="w-full text-left p-3 rounded-lg border border-current opacity-80 hover:opacity-100 hover:bg-black/5 dark:hover:bg-white/5 text-xs flex justify-between items-center transition-all">
                            <div class="truncate pr-2">
                                <div class="font-semibold">${chapter.title}</div>
                                <div class="text-[10px] opacity-60">${chapter.pageRange}</div>
                            </div>
                            <svg class="w-4 h-4 text-[#23599c] dark:text-[#508ad3] flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z" />
                            </svg>
                        </button>
                        `;
                    }
                });
            }

            container.innerHTML = tabHTML;
        }

        function renderSearchPanel() {
            const resultsContent = document.getElementById('search-results-content');
            const GrandpaResultsInfo = document.getElementById('search-results-info');
            if (!resultsContent || !GrandpaResultsInfo) return;

            const results = [];
            if (state.searchQuery.trim()) {
                ebookData.forEach(chapter => {
                    chapter.content.forEach((paragraph, pIdx) => {
                        if (paragraph.toLowerCase().includes(state.searchQuery.toLowerCase())) {
                            results.push({
                                chapterId: chapter.id,
                                chapterTitle: chapter.title,
                                paragraph: paragraph,
                                index: pIdx
                            });
                        }
                    });
                });
            }

            // Mostra informações do resultado de pesquisa
            if (state.searchQuery) {
                GrandpaResultsInfo.classList.remove('hidden');
                GrandpaResultsInfo.innerText = `${results.length} trechos encontrados`;
            } else {
                GrandpaResultsInfo.classList.add('hidden');
            }

            let resultsHTML = '';
            results.forEach(res => {
                const matchedChapterIdx = ebookData.findIndex(c => c.id === res.chapterId);
                resultsHTML += `
                <button onclick="setChapter(${matchedChapterIdx}); toggleTabPanel('search');" class="w-full text-left p-2.5 rounded-lg border border-[#23599c]/20 hover:bg-[#23599c]/5 text-xs space-y-1 block transition-all">
                    <div class="font-bold text-[#23599c] dark:text-[#508ad3] truncate">${res.chapterTitle}</div>
                    <p class="line-clamp-3 opacity-80 italic">"...${highlightText(res.paragraph, state.searchQuery)}..."</p>
                </button>
                `;
            });

            if (state.searchQuery && results.length === 0) {
                resultsHTML += `<p class="text-xs text-center opacity-60 py-4">Nenhum resultado para "${state.searchQuery}".</p>`;
            } else if (!state.searchQuery) {
                resultsHTML += `<p class="text-xs text-center opacity-60 py-4">Digite termos acima para pesquisar em todo o e-book...</p>`;
            }

            resultsContent.innerHTML = resultsHTML;
        }

        function handleSearch(val) {
            state.searchQuery = val;
            renderSearchPanel();
            renderContent();
        }

        // --- EXECUÇÃO DE ARRANQUE DO APLICATIVO ---
        window.onload = function() {
            loadBookmarks();
            setTheme('light'); // Define tema Dia (claro) como padrão inicial
            setChapter(-1);    // Define a página inicial como a Capa Escrita
        };
    </script>
</body>
</html>
